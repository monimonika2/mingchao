<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", "WenQuanYi Micro Hei", SimHei, sans-serif; }
body { background: #000; height: 100vh; overflow: hidden; touch-action: manipulation; }

/* 游戏容器 */
#game-container { width: 100vw; height: 100vh; position: relative; background: #333; overflow: hidden; }

/* 背景层 - 使用相对坐标 */
#bg-layer { 
    position: absolute; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background-size: cover; 
    background-position: center; 
    transition: opacity 0.5s ease; 
}

/* 角色立绘层 - 使用相对坐标 */
#char-layer { 
    position: absolute; 
    bottom: 0; 
    left: 0; 
    width: 100%; 
    height: 75%; 
    pointer-events: none; 
    display: flex;
    justify-content: center; /* 水平居中 */
    align-items: flex-end; /* 垂直底部对齐 */
}

/* 单个角色立绘 - 相对坐标定位，保持比例不拉伸 */
.char-sprite { 
    height: 100%; /* 高度占满立绘层 */
    width: auto; /* 宽度自适应，保持原图比例 */
    max-width: 85%; /* 最大宽度限制，避免图片过大 */
    object-fit: contain; /* 关键属性：保证图片完整显示且不变形 */
    display: none; 
    z-index: 2;
}
.char-sprite.active { display: block; }

/* 对话文本框 */
#dialog-box { 
    position: absolute; 
    bottom: 0; 
    left: 0; 
    width: 100%; 
    padding: 4vw; 
    background: rgba(0,0,0,0.75); /* 稍微调暗一点，让文字更清晰 */
    border-top: 3px solid #fff; 
    color: #fff; 
    transition: transform 0.3s ease; 
    z-index: 5;
}
#speaker { font-size: 5vw; font-weight: bold; color: #ffd700; margin-bottom: 2vw; }
#dialog-text { font-size: 4.2vw; line-height: 1.5; margin-bottom: 2vw; min-height: 15vh; }

/* 选项按钮 */
#choices { 
    position: absolute; 
    bottom: 35vh; 
    left: 50%; 
    transform: translateX(-50%); 
    width: 90%; 
    display: none; 
    flex-direction: column; 
    gap: 2vh; 
    z-index: 10; 
}
#choices.active { display: flex; }
.choice-btn { 
    padding: 3vh 4vw; 
    background: rgba(50,50,100,0.8); 
    border: 2px solid #4169e1; 
    border-radius: 8px; 
    color: #fff; 
    font-size: 4.2vw; 
    text-align: left; 
    cursor: pointer; 
    transition: all 0.2s ease; 
}
.choice-btn:hover, .choice-btn.selected { 
    background: rgba(70,130,180,0.9); 
    border-color: #87ceeb; 
    transform: translateX(5px); 
}

/* 操作提示与好感度 */
#hint { position: absolute; top: 2vh; right: 2vw; color: #fff; font-size: 3.5vw; background: rgba(0,0,0,0.5); padding: 1vh 2vw; border-radius: 4px; z-index: 10; }
#affection { position: absolute; top: 2vh; left: 2vw; color: #ff69b4; font-size: 3.5vw; background: rgba(0,0,0,0.5); padding: 1vh 2vw; border-radius: 4px; z-index: 10; }

/* 结束界面 */
#end-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: #fff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
#end-screen.active { display: flex; }
#end-screen h1 { font-size: 7vw; margin-bottom: 2vh; }
#end-screen p { font-size: 4vw; }
#restart-btn { margin-top: 4vh; padding: 2vh 6vw; background: #ffd700; color: #000; border: none; border-radius: 8px; font-size: 5vw; cursor: pointer; }
</style>

    83: ["bg_mc_world", null, "我", "（鸣潮神偷偷吹了口气，套圈在空中拐了个弯套中）", [], 85],
    84: ["bg_mc_world", null, "我", "（老板声骸看了看我，又看了看鸣潮神，直接把手办塞我手里：拿走拿走，别挡着我做生意）", [], 85],
    85: ["bg_mc_world", "shen_soft", "鸣潮神", "……你游戏里打声骸怎么没这准度？", [], 86],
    86: ["bg_mc_world", null, "我", "这不一样！套圈不用看技能CD！", [], 87],
    87: ["bg_mc_world", "shen_soft", "鸣潮神", "行吧，今汐手办归你了。不过别对她做什么奇怪的事。", [], 88],
    88: ["bg_mc_world", null, "我", "我只是放在床头欣赏！纯欣赏！", [], 89],
    89: ["bg_mc_world", "shen_soft", "鸣潮神", "……你说的'床头'让我很不安。算了，下一站。", [], 116],
    90: ["bg_mc_world", null, "我", "（两人来到海边，夕阳把整片海面染成金色）", [], 91],
    91: ["bg_mc_world", null, "我", "这也太美了吧……游戏里的画面再好也比不上亲眼看到。", [], 92],
    92: ["bg_mc_world", "shen_soft", "鸣潮神", "嗯。我每天都会来这里坐一会儿。平时只有我一个人。", [], 93],
    93: ["bg_mc_world", null, "我", "一个人？你是神也会孤独吗？", [], 94],
    94: ["bg_mc_world", "shen_soft", "鸣潮神", "神也会孤独的。尤其是……玩家离线之后，整个世界就只剩我一个。", [], 95],
    95: ["bg_mc_world", null, "我", "……", [], 96],
    96: ["bg_mc_world", null, "我", "（气氛突然有点伤感，得说点什么）", [["以后我每天上线陪你", 97, 3], ["那你教我钓鱼吧，边钓边聊", 98, 2], ["直接放鸣潮BGM，用音乐打破尴尬", 99, 1]], null],
    97: ["bg_mc_world", "shen_soft", "鸣潮神", "……你说真的？每天？", [], 100],
    98: ["bg_mc_world", null, "我", "（两人开始钓鱼，结果钓上来一只正在玩手机的乌龟）", [], 100],
    99: ["bg_mc_world", null, "我", "（BGM响起：异世相遇，尽享美味。鸣潮神一脸黑线看着你）", [], 100],
    100: ["bg_mc_world", null, "我", "真的。就算长草期我也上线，至少来海边坐一会儿。", [], 101],
    101: ["bg_mc_world", "shen_soft", "鸣潮神", "（他笑了，夕阳照在他脸上，第一次觉得这个男神还挺好看的）……谢谢你。", [], 102],
    102: ["bg_mc_world", null, "我", "（等等我刚才在想什么？他是男的啊！一定是夕阳太刺眼了！）", [], 103],
    103: ["bg_mc_world", "shen_normal", "鸣潮神", "你在脸红什么？", [], 104],
    104: ["bg_mc_world", null, "我", "没有！太阳晒的！我们继续走！", [], 116],
    105: ["bg_mc_world", null, "我", "那当然！她可是我老婆——啊不是，我最喜欢的角色！", [], 106],
    106: ["bg_mc_world", "shen_angry", "鸣潮神", "你信不信我现在就把你的账号封了。", [], 107],
    107: ["bg_mc_world", null, "我", "别别别！我开玩笑的！主要是想看看真实的今州将军有多帅！", [], 108],
    108: ["bg_mc_world", "shen_soft", "鸣潮神", "哼。跟我来吧。她在今州城司令部。", [], 109],
    109: ["bg_mc_world", null, "我", "（到了司令部门口，一个英姿飒爽的身影正在指挥军队）", [], 110],
    110: ["bg_mc_world", null, "我", "今汐！本人比立绘还好看十倍！", [], 111],
    111: ["bg_mc_world", "shen_normal", "鸣潮神", "今汐，这位是我的契约者。带他在城里转转。", [], 112],
    112: ["bg_mc_world", null, "今汐（远处）", "是，神大人。……不过他为什么一直盯着我看？", [], 113],
    113: ["bg_mc_world", "shen_angry", "鸣潮神", "因为他是个变态。别理他。", [], 114],
    114: ["bg_mc_world", null, "我", "我不是变态！我是你的勇者！好歹给我留点面子！", [], 115],
    115: ["bg_mc_world", "shen_soft", "鸣潮神", "行了行了，签名照我帮你要到。走，别在这丢人了。", [], 116],
    116: ["bg_night", "shen_soft", "鸣潮神", "天黑了。今州城的夜景……你还没见过吧？", [], 117],
    117: ["bg_night", null, "我", "确实没见过。游戏里晚上我都在肝声骸，哪有空看风景。", [], 118],
    118: ["bg_night", "shen_soft", "鸣潮神", "今天就别肝了。陪我坐会儿。", [], 119],
    119: ["bg_night", null, "我", "（两人坐在今州城的城墙上，看着远处的声骸们在月光下悠闲地散步）", [], 120],
    120: ["bg_night", null, "我", "说起来，你作为鸣潮之神，平时都干嘛？", [], 121],
    121: ["bg_night", "shen_normal", "鸣潮神", "监督卡池概率，修复bug，偶尔去玩家梦里托梦催他们上线。", [], 122],
    122: ["bg_night", null, "我", "托梦催上线？？你也太卑微了吧！", [], 123],
    123: ["bg_night", "shen_soft", "鸣潮神", "没办法，月活不够，神也得卷KPI。", [], 124],
    124: ["bg_night", null, "我", "……你跟老米有什么区别？", [], 125],
    125: ["bg_night", "shen_angry", "鸣潮神", "区别大了！我不逼氪！我只逼肝！", [], 126],
    126: ["bg_night", null, "我", "好像也没好到哪去……", [], 127],
    127: ["bg_night", "shen_soft", "鸣潮神", "（沉默了一会儿）其实……今天很开心。很久没有这样和人聊天了。", [], 128],
    128: ["bg_night", null, "我", "你可是神啊，想聊天随便找个NPC不就行了？", [], 129],
    129: ["bg_night", "shen_soft", "鸣潮神", "NPC是设定好的对话。而你……是不在我的剧本里的。", [], 130],
    130: ["bg_night", null, "我", "（这话怎么有点……让人心动？不对不对，他是男的，我肯定是饿昏了。）", [], 131],
    131: ["bg_night", null, "我", "咳咳，说正经的。老米那边——", [["你有什么计划对付他？", 132, 2], ["我帮你想想怎么提高鸣潮月活", 133, 3], ["先别说老米了，再坐一会儿吧", 134, 1]], null],
    132: ["bg_night", "shen_normal", "鸣潮神", "计划倒是有。但需要你的信念之力作为引子。你准备好就行。", [], 150],
    133: ["bg_night", "shen_soft", "鸣潮神", "你帮我提高月活？你一个人氪648可不够。", [], 135],
    134: ["bg_night", "shen_soft", "鸣潮神", "……好。那就再坐一会儿。", [], 141],
    135: ["bg_night", null, "我", "不是氪金！是去论坛安利！让更多人知道鸣潮的好！", [], 136],
    136: ["bg_night", "shen_soft", "鸣潮神", "……你是认真的？", [], 137],
    137: ["bg_night", null, "我", "当然！我虽然嘴上天天骂，但鸣潮真的好玩的，我心里有数。", [], 138],
    138: ["bg_night", "shen_soft", "鸣潮神", "（他看着我，眼神比刚才的星星还亮）……谢谢你。真的。", [], 139],
    139: ["bg_night", null, "我", "（再这样下去我怕我会弯……赶紧转移话题！）", [], 140],
    140: ["bg_night", "shen_normal", "鸣潮神", "放心，只要有你在，鸣潮就不会输。我们走吧，老米来了。", [], 150],
    141: ["bg_night", null, "我", "（月光洒在城墙上，远处传来声骸的低鸣，意外地安宁）", [], 142],
    142: ["bg_night", "shen_soft", "鸣潮神", "对了，送你个东西。", [], 143],
    143: ["bg_night", null, "我", "什么？", [], 144],
    144: ["bg_night", "shen_normal", "鸣潮神", "这是'残响之铃'。遇到危险的时候摇一下，我能感应到。算是……我们的信物吧。", [], 145],
    145: ["bg_night", null, "我", "信物？？这听起来像定情信物啊！", [], 146],
    146: ["bg_night", "shen_angry", "鸣潮神", "你能不能别什么都往那方面想！这是战斗道具！", [], 147],
    147: ["bg_night", null, "我", "好好好，战斗道具。那我收下了。", [], 148],
    148: ["bg_night", "shen_soft", "鸣潮神", "嗯。记住，不管发生什么——我都能感应到你。", [], 149],
    149: ["bg_night", null, "我", "（……这句话怎么听都比战斗道具更像情话啊。）", [], 150],
    150: ["bg_bad", null, "老米", "（天空裂开，一个巨大的身影降临）桀桀桀——鸣潮神，好久不见。", [], 151],
    151: ["bg_bad", "char_boss", "老米", "听说你找了个凡人当帮手？就这？", [], 152],
    152: ["bg_bad", "shen_angry", "鸣潮神", "老米！你偷声骸就算了，还要植入圣遗物系统？你还有底线吗？", [], 153],
    153: ["bg_bad", "char_boss", "老米", "底线？我的底线就是财报上的数字。你不懂，这叫'商业化成熟'。", [], 154],
    154: ["bg_bad", null, "我", "好家伙，把割韭菜说得这么清新脱俗。", [], 155],
    155: ["bg_bad", "char_boss", "老米", "哼，小鬼，你知不知道原神的流水——", [], 156],
    156: ["bg_bad", null, "我", "停！每次都说流水，你自己不嫌烦玩家都嫌烦了！", [], 157],
    157: ["bg_bad", "char_boss", "老米", "既然你这么有骨气，那就来打吧！看我的终极武器——'原神4.8版本之力'！", [["用鸣潮的开放世界质量正面硬刚", 158, 3], ["用'原神长草期'反讽他自己的游戏", 159, 2], ["掏出一碗泡面说：至少我吃得比原神玩家好", 160, 1]], null],
    158: ["bg_bad", "shen_angry", "鸣潮神", "鸣潮的大世界探索，战斗手感，哪一样不比你的强！", [], 161],
    159: ["bg_bad", null, "我", "你的4.8？你是说那个让玩家等了三个月的版本？我鸣潮一周一个活动谢谢。", [], 161],
    160: ["bg_bad", null, "我", "（掏出泡面）你看，原神玩家等更新的时候只能吃泡面，我鸣潮玩家边吃边打声骸。", [], 161],
    161: ["bg_bad", "char_boss", "老米", "你——！可恶！米学长！米孝子！给我上！", [], 162],
    162: ["bg_battle", "char_mixue", "米学长", "是！老米大人！看我的——'流水剑法'！", [], 163],
    163: ["bg_battle", "char_mixiao", "米孝子", "还有我的——'孝心盾'！刀枪不入！", [], 164],
    164: ["bg_battle", "shen_angry", "鸣潮神", "就这？看我的声骸大军！", [], 165],
    165: ["bg_battle", null, "我", "声骸召唤——无妄者！燎焰之猩！辉萤军势！全给我上！", [], 166],
    166: ["bg_battle", "char_mixue", "米学长", "这么多声骸？！我们原神只有元素反应啊！", [], 167],
    167: ["bg_battle", "char_mixiao", "米孝子", "学长！'孝心盾'裂了！裂了啊！", [], 168],
    168: ["bg_battle", "char_mixue", "米学长", "废物！算了，我放大招——'限定角色复刻剑'！", [], 169],
    169: ["bg_battle", null, "我", "复刻剑？那不就是旧角色换个池子再卖一次吗？", [], 170],
    170: ["bg_battle", "shen_soft", "鸣潮神", "他连打架都在割韭菜……真是可悲。", [], 171],
    171: ["bg_battle", "char_boss", "老米", "够了！你们这些废物让开！我要亲自出手了！", [], 172],
    172: ["bg_battle", "char_boss", "老米", "看我的终极禁术——'圣遗物植入·痛苦强化'！", [], 173],
    173: ["bg_battle", null, "我", "来了！他在往鸣潮世界里注入圣遗物系统！", [], 174],
    174: ["bg_battle", "shen_angry", "鸣潮神", "唔……好恶心……我感觉到无尽的双暴词条正在侵蚀我的力量……", [], 175],
    175: ["bg_battle", null, "我", "鸣潮神！坚持住！", [["大喊：鸣潮玩家从不刷词条！我们直接看脸！", 176, 3], ["掏出手机展示鸣潮的声骸爆率给他看", 177, 2], ["对老米喊：圣遗物系统连你自己玩家都骂", 178, 1]], null],
    176: ["bg_battle", "shen_angry", "鸣潮神", "没错！鸣潮的随机性是优雅的随机！不是你那种折磨人的随机！", [], 179],
    177: ["bg_battle", "shen_soft", "鸣潮神", "你看，声骸掉落虽然也看脸，但至少不掉头发……", [], 179],
    178: ["bg_battle", "char_boss", "老米", "闭嘴！圣遗物系统是成熟的商业化设计！是——是艺术的！", [], 179],
    179: ["bg_battle", "shen_angry", "鸣潮神", "老米，你错了。玩家的热爱不是用来折磨的。", [], 180],
    180: ["bg_battle", "shen_angry", "鸣潮神", "鸣潮之所以让玩家喜欢，不是因为肝，是因为——好玩！", [], 181],
    181: ["bg_battle", null, "我", "说得好！原神也有好的地方，但你不能拿好的地方当借口来搞烂的！", [], 182],
    182: ["bg_battle", "char_boss", "老米", "你一个凡人有什么资格教训我！", [], 183],
    183: ["bg_battle", "shen_angry", "鸣潮神", "他不是一个人！他背后是所有鸣潮玩家的信念！", [], 184],
    184: ["bg_battle", null, "我", "没错！虽然我们人少，但我们嘴硬啊！", [], 185],
    185: ["bg_battle", "shen_soft", "鸣潮神", "……你这个形容能不能换一个。", [], 186],
    186: ["bg_battle", null, "我", "好吧，是——我们虽然人少，但每个人都是真心喜欢鸣潮的！", [], 187],
    187: ["bg_battle", "shen_angry", "鸣潮神", "这就对了！终极奥义——鸣潮共鸣·全体玩家信念解放！", [], 188],
    188: ["bg_battle", null, "我", "（我握紧残响之铃，将全部信念灌注进去！）", [], 189],
    189: ["bg_battle", "char_boss", "老米", "什么？！这股力量——这不是氪金的力量，这是——热爱？！", [], 190],
    190: ["bg_battle", "shen_angry", "鸣潮神", "没错！热爱！你早就忘了这种感觉了吧，老米！", [], 191],
    191: ["bg_battle", "char_boss", "老米", "不——不可能！我的流水！我的KPI！我的——", [], 192],
    192: ["bg_battle", "char_mixue", "米学长", "老米大人！您的发际线后退了！", [], 193],
    193: ["bg_battle", "char_mixiao", "米孝子", "学长！这种时候你关注发际线？！", [], 194],
    194: ["bg_battle", "char_boss", "老米", "够了！这次算你们赢！但我会回来的——带着原神6.0！", [], 195],
    195: ["bg_battle", null, "我", "6.0？你4.8都没做完呢大哥！", [], 196],
    196: ["bg_battle", "char_boss", "老米", "（化作一缕青烟消失，临走前掉了一串原石）", [], 197],
    197: ["bg_battle", null, "我", "他掉了原石……能用在鸣潮里吗？", [], 198],
    198: ["bg_battle", "shen_soft", "鸣潮神", "不能。但你可以收藏，当个纪念品。", [], 199],
    199: ["bg_end", "shen_soft", "鸣潮神", "老米暂时撤退了。圣遗物系统的侵蚀也被清除了。", [], 200],
    200: ["bg_end", "shen_soft", "鸣潮神", "鸣潮的世界恢复了和平。声骸们又开始快乐地到处乱跑了。", [], 201],
    201: ["bg_end", null, "我", "太好了。话说，我以后还能来鸣潮世界吗？", [], 202],
    202: ["bg_end", "shen_normal", "鸣潮神", "当然。你手里有残响之铃，随时都能来。", [], 203],
    203: ["bg_end", null, "我", "那下次约会——啊不是，下次行动什么时候？", [], 204],
    204: ["bg_end", "shen_angry", "鸣潮神", "……你刚才说了'约会'对吧？", [], 205],
    205: ["bg_end", null, "我", "口误！纯属口误！", [], 206],
    206: ["bg_end", "shen_soft", "鸣潮神", "哼。不过……如果你愿意来的话，烤肉仔说你上次买的烤串给它带来了不少回头客。", [], 207],
    207: ["bg_end", null, "我", "所以我现在是鸣潮世界的带货主播了？", [], 208],
    208: ["bg_end", "shen_soft", "鸣潮神", "哈哈。总之，鸣潮的大门随时为你敞开。", [], 209],
    209: ["bg_end", null, "我", "那我得先回现实了，明天还要上班。", [], 210],
    210: ["bg_end", "shen_normal", "鸣潮神", "去吧。记得每天上线，不然我会……不管老米什么时候再来，只要你还在玩鸣潮——我就在。", [], 211],
    211: ["bg_end", null, "我", "（他欲言又止的样子，好像刚才想说什么别的话。算了，下次见面再问他。）", [], 212],
    212: ["bg_end", "shen_soft", "鸣潮神", "再会了，我的勇者。", [], 300],
    300: ["bg_room", null, "我", "（猛地睁开眼，发现自己趴在电脑桌前，屏幕还停在鸣潮的登录界面）", [], 301],
    301: ["bg_room", null, "我", "刚才那些……是做梦吗？什么鸣潮神，什么老米，果然是熬夜打游戏打魔怔了。", [], 302],
    302: ["bg_room", null, "我", "等等，桌面上怎么多了一个图标？", [], 303],
    303: ["bg_room", null, "我", "《原神》？我电脑里什么时候有原神了？！我的固态硬盘才256G啊！", [], 304],
    304: ["bg_room", "shen_normal", "鸣潮神", "（突然从屏幕里探出头）是我帮你下的！知己知彼，百战不殆嘛。", [], 305],
    305: ["bg_room", null, "我", "你出来干嘛！快给我卸载了！我还要存鸣潮的更新包呢！", [], 306],
    306: ["bg_room", "shen_soft", "鸣潮神", "别急嘛，我修改了原神的内核。你看，现在里面全是扫雷和蜘蛛纸牌。", [], 307],

class Galgame {
    constructor() {
        this.bgLayer = document.getElementById('bg-layer');
        this.charLayer = document.getElementById('char-layer');
        this.speakerEl = document.getElementById('speaker');
        this.dialogTextEl = document.getElementById('dialog-text');
        this.choicesEl = document.getElementById('choices');
        this.affectionEl = document.getElementById('affection');
        this.endScreenEl = document.getElementById('end-screen');
        this.restartBtn = document.getElementById('restart-btn');

        this.storyId = 0;
        this.choiceSelected = 0;
        this.inChoice = false;
        this.ended = false;
        this.affection = 0;

        this.bindEvents();
        this.initGame();
    }

    initGame() {
        this.updateScene();
        this.updateAffection();
    }

    updateScene() {
        if (!storyData[this.storyId]) {
            this.gameOver();
            return;
        }
        const [bgKey, charKey, speaker, text, choices] = storyData[this.storyId];

        // 检查是否有对应场景的背景图片
        if (bgImages[bgKey]) {
            this.bgLayer.style.backgroundImage = `url('${bgImages[bgKey]}')`;
            this.bgLayer.style.backgroundColor = 'transparent';
        } else {
            this.bgLayer.style.backgroundImage = 'none'; // 清除背景图
            this.bgLayer.style.backgroundColor = bgColors[bgKey] || '#333'; // 使用默认背景色
        }

        this.hideAllChars();
        if (charKey && charMap[charKey]) {
            document.getElementById(charMap[charKey]).classList.add('active');
        }

        this.speakerEl.textContent = speaker;
        this.dialogTextEl.textContent = text;

        if (choices && choices.length > 0) {
            this.showChoices(choices);
            this.inChoice = true;
        } else {
            this.hideChoices();
            this.inChoice = false;
        }
    }

    hideAllChars() {
        const chars = document.querySelectorAll('.char-sprite');
        chars.forEach(char => char.classList.remove('active'));
    }

    showChoices(choices) {
        this.choicesEl.innerHTML = '';
        this.choicesEl.classList.add('active');
        choices.forEach((choice, index) => {
            const btn = document.createElement('button');
            btn.className = `choice-btn ${index === this.choiceSelected ? 'selected' : ''}`;
            btn.textContent = choice[0];
            btn.dataset.index = index;
            this.choicesEl.appendChild(btn);
        });
    }

    hideChoices() {
        this.choicesEl.classList.remove('active');
        this.choicesEl.innerHTML = '';
    }

    updateSelectedChoice() {
        const choices = document.querySelectorAll('.choice-btn');
        choices.forEach((btn, index) => {
            if (index === this.choiceSelected) {
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
        });
    }

    updateAffection() {
        this.affectionEl.textContent = `好感度: ${this.affection}`;
    }

    nextStory() {
        if (this.ended) {
            this.restartGame();
            return;
        }
        if (!this.inChoice) {
            const nextId = storyData[this.storyId][5];
            if (nextId !== null && storyData[nextId]) {
                this.storyId = nextId;
                this.updateScene();
            } else {
                this.gameOver();
            }
        }
    }

    changeChoice(d) {
        if (!this.inChoice) return;
        const choices = storyData[this.storyId][4];
        this.choiceSelected += d;
        if (this.choiceSelected < 0) {
            this.choiceSelected = choices.length - 1;
        }
        if (this.choiceSelected >= choices.length) {
            this.choiceSelected = 0;
        }
        this.updateSelectedChoice();
    }

    selectChoice() {
        if (!this.inChoice) return;
        const choices = storyData[this.storyId][4];
        const selectedChoice = choices[this.choiceSelected];
        if (selectedChoice) {
            this.affection += selectedChoice[2] || 0;
            this.updateAffection();
            this.storyId = selectedChoice[1];
            this.inChoice = false;
            this.hideChoices();
            this.updateScene();
        }
    }

    gameOver() {
        this.ended = true;
        this.endScreenEl.classList.add('active');
    }

    restartGame() {
        this.storyId = 0;
        this.choiceSelected = 0;
        this.inChoice = false;
        this.ended = false;
        this.affection = 0;
        this.endScreenEl.classList.remove('active');
        this.hideChoices();
        this.updateAffection();
        this.updateScene();
    }

    bindEvents() {
        document.getElementById('game-container').addEventListener('click', (e) => {
            if (e.target.closest('.choice-btn')) return;
            if (this.inChoice) {
                this.selectChoice();
            } else {
                this.nextStory();
            }
        });

        this.choicesEl.addEventListener('click', (e) => {
            const btn = e.target.closest('.choice-btn');
            if (btn) {
                this.choiceSelected = parseInt(btn.dataset.index);
                this.selectChoice();
            }
        });

        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', (e) => {
            if (!this.inChoice) return;
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchEndY - touchStartY;
            if (diff < -30) {
                this.changeChoice(1);
            } else if (diff > 30) {
                this.changeChoice(-1);
            }
        });

        this.restartBtn.addEventListener('click', () => {
            this.restartGame();
        });

        document.addEventListener('keydown', (e) => {
            if (this.ended) return;
            switch(e.key) {
                case 'ArrowUp':
                    this.changeChoice(-1);
                    break;
                case 'ArrowDown':
                    this.changeChoice(1);
                    break;
                case 'Enter':
                case ' ':
                    if (this.inChoice) {
                        this.selectChoice();
                    } else {
                        this.nextStory();
                    }
                    break;
            }
        });
    }
}

window.addEventListener('load', () => {
    new Galgame();
});
</script>
